commands:
  install: cd src && python3 -m venv venv && ./venv/bin/pip install -r requirements.txt
  build: cd src && ./venv/bin/python -m venv venv && ./venv/bin/pip install -r requirements.txt
  test: cd src && ./venv/bin/python -m pytest tests/ -v
  test_e2e: cd src && ./venv/bin/python -m pytest tests/e2e/ -v
  lint: cd src && ./venv/bin/ruff check .
  typecheck: cd src && ./venv/bin/python -m mypy src/ || true

services:
  api:
    start: cd src && ./venv/bin/uvicorn src.api:app --reload --port 8000
    stop: lsof -ti :8000 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8000/health || echo "API not ready"
    port: 8000
    depends_on: []

  flet_web:
    start: cd src && ./venv/bin/flet run --web --port 3100
    stop: lsof -ti :3100 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100 || echo "Flet not ready"
    port: 3100
    depends_on: [api]
