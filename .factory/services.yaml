commands:
  install: pnpm install
  typecheck: npm run typecheck
  build: npm run build
  test: npm run test
  test:e2e: npx playwright test
  lint: npm run lint

services:
  postgres:
    start: docker compose up -d postgres
    stop: docker compose stop postgres
    healthcheck: pg_isready -h localhost -p 5432
    port: 5432
    depends_on: []

  backend:
    start: PORT=3100 npx tsx backend/server.ts
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100/health
    port: 3100
    depends_on: [postgres]

  frontend:
    start: PORT=3101 npm run dev:frontend
    stop: lsof -ti :3101 | xargs kill
    healthcheck: curl -sf http://localhost:3101
    port: 3101
    depends_on: [backend]

  ollama:
    start: ollama serve
    stop: pkill -f "ollama serve"
    healthcheck: curl -sf http://localhost:11434/api/tags
    port: 11434
    depends_on: []

  stt:
    start: cd servers/stt && node server.mjs --port 8765
    stop: lsof -ti :8765 | xargs kill
    healthcheck: curl -sf http://localhost:8765/health
    port: 8765
    depends_on: []

  tts:
    start: cd servers/tts && python3 server.py --port 8766
    stop: lsof -ti :8766 | xargs kill
    healthcheck: curl -sf http://localhost:8766/health
    port: 8766
    depends_on: []
