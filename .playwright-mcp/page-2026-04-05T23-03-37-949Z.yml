      - log "Chat messages" [ref=e79]:
        - article "Your message" [ref=e90]:
          - img [ref=e92]
          - generic [ref=e96]: I've been feeling overwhelmed with work lately and struggling to find peace of mind.
        - article "Marcus response" [ref=e97]:
          - img [ref=e99]
          - generic [ref=e103]: "My friend Validation User, I too have known the weight of burdensome duties and the turmoil of an overactive mind. As Emperor, I faced many challenges, from wars to plagues, which tested my ability to remain steadfast in the face of uncertainty. In times like these, I recall the words of Epictetus: \"It's not what happens to you, but how you react to it that matters.\" (Discourses, Book 1, Chapter 12) As a Stoic, I've learned to distinguish between what lies within my control and what does not. Tell me, Validation User, where do you feel the overwhelm residing? Is it in your work itself, or perhaps in the expectations of others or even your own desires?"
        - article "Your message" [ref=e104]:
          - img [ref=e106]
          - generic [ref=e110]: The main source of stress is deadlines. I feel like I never have enough time to do things properly.
        - article "Marcus response" [ref=e111]:
          - img [ref=e113]
          - generic [ref=e117]: "Deadlines and time constraints - a common conundrum for many. (Meditations, Book 2, Section 1) As someone who has overseen the vast expanse of the Roman Empire, I can attest that deadlines often feel like an insurmountable obstacle. When faced with such pressures, it's natural to become anxious about not meeting expectations or, worse still, falling short. But, my friend, remember that true time is yours alone; it's how you allocate it that matters. Consider this: what are the things that truly require your focus and attention? Are they essential tasks that bring value to others, or are they mere distractions from more important pursuits? I once said, \"You have power over your mind - not outside events. Realize this, and you will find strength.\" (Meditations, Book 4, Section 31) Focus on what you can control: how you allocate your time, how you prioritize tasks, and how you prepare for the challenges ahead. Take a moment to reflect: What are the deadlines that truly drive your anxiety? Are there any tasks or responsibilities where you feel you're not being utilized effectively? And when you do find yourself struggling with time constraints, recall the wisdom of Seneca: \"The greatest obstacle to living is expectancy, which hangs upon tomorrow and loses today.\" (Letters from a Stoic)"
