          - article "Marcus's response" [ref=e264]:
            - img [ref=e266]
            - generic [ref=e269]: "My friend testuser, I too have known the weight of anxiety in my own time as emperor. The burden of responsibility can be crushing at times. But tell me, what is it that you fear at work? Is it a specific task or situation, or perhaps a sense of inadequacy? As I wrote in Meditations: \"The impediment to action advances action. What stands in the way becomes the way.\" Perhaps your anxiety is not about avoiding challenges, but rather finding a new path forward. Consider this: what are your values and goals? Are they aligned with your current work situation? Sometimes, it is our own expectations that create the most discomfort."
