<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial, sans-serif; padding: 30px; background: #1a1a1a; color: white; }

.icons { display: flex; gap: 50px; align-items: flex-end; }
.icon-box { text-align: center; background: #2a2a2a; padding: 25px; border-radius: 12px; min-width: 140px; }
.icon-box h3 { margin: 15px 0 8px; font-size: 16px; }
.icon-box p { margin: 0; color: #888; font-size: 13px; }
</style>
</head>
<body>

<div class="icons">

      <line x1="23" y1="9" x2="17" y2="15" stroke="#888" stroke-width="2" stroke-linecap="round"/>

    </svg>
    <h3>SPEAKING</h3>
    <p>Currently playing - )) double arc</p>

</div>

</html>
